name: mcs
description: MCS - Medical Clinic Management System. A comprehensive multi-platform clinic management solution.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Core & State Management ---
  cupertino_icons: ^1.0.6
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.0
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6

  # --- Supabase Backend ---
  supabase_flutter: ^2.8.0

  # --- Navigation & Routing ---
  go_router: ^14.6.2
  url_strategy: ^0.3.0

  # --- UI & Design ---
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  animate_do: ^3.3.4
  animations: ^2.0.8

  # --- Localization ---
  intl: ^0.20.2

  # --- Local Storage ---
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4

  # --- Authentication & Security ---
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  # --- Image & File Handling ---
  image_picker: ^1.1.2
  file_picker: ^8.1.6

  # --- Push Notifications ---
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.8.1

  # --- Utilities ---
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.2
  device_info_plus: ^11.2.1
  permission_handler: ^11.3.1

  # --- Video Call (Future) ---
  agora_rtc_engine: ^6.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Testing ---
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # --- Linting ---
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
